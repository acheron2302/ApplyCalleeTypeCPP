name: Build ApplyCalleTypeCpp Plugin

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  discover-sdk-tags:
    name: Discover IDA SDK tags
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Discover SDK tags
        id: discover
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.request

          tags = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/HexRaysSA/ida-sdk/tags?per_page=100&page={page}"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                      "User-Agent": "ApplyCalleTypeCpp-CI",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  batch = json.loads(response.read().decode("utf-8"))
              if not batch:
                  break
              tags.extend(item["name"] for item in batch)
              page += 1

          def sort_key(tag):
              numbers = tuple(int(part) for part in re.findall(r"\d+", tag))
              return numbers, tag

          tags = sorted(set(tags), key=sort_key, reverse=True)
          if not tags:
              raise SystemExit("No HexRaysSA/ida-sdk tags were discovered")

          # Filter: only latest tag from 9.3.x
          keep_tags = []
          for prefix in ("v9.3"):
              matching = [t for t in tags if t.startswith(prefix)]
              if matching:
                  keep_tags.append(matching[0])  # newest first from sorted

          if not keep_tags:
              raise SystemExit("No v9.2 or v9.3 tags found")

          include = []
          for tag in keep_tags:
              safe_tag = re.sub(r"[^A-Za-z0-9_.-]+", "-", tag).strip("-")
              include.append({
                  "os": "windows-latest",
                  "c_compiler": "cl",
                  "cpp_compiler": "cl",
                  "build_type": "Release",
                  "qt_arch": "win64_msvc2022_64",
                  "plugin_glob": "ApplyCalleTypeCpp.dll",
                  "sdk_ref": tag,
                  "artifact_name": f"ApplyCalleTypeCpp-windows-msvc-{safe_tag}",
              })

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}\n")
          PY

  build:
    name: ${{ matrix.artifact_name }}
    needs: discover-sdk-tags
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-sdk-tags.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout IDA SDK
        uses: actions/checkout@v4
        with:
          repository: HexRaysSA/ida-sdk
          path: idasdk
          ref: ${{ matrix.sdk_ref }}

      - name: Install ida-cmake
        shell: bash
        run: |
          rm -rf idasdk/ida-cmake
          git clone --depth 1 https://github.com/allthingsida/ida-cmake.git idasdk/ida-cmake
          test -f idasdk/ida-cmake/bootstrap.cmake

      - name: Install Qt headers and tools
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          target: desktop
          arch: ${{ matrix.qt_arch }}
          aqtversion: ''
          cache: true

      - name: Verify IDA SDK Qt import libraries
        shell: pwsh
        run: |
          $qtLibDir = Join-Path "${{ github.workspace }}" 'idasdk/src/lib/x64_win_qt'
          foreach ($lib in 'Qt6Core.lib', 'Qt6Gui.lib', 'Qt6Widgets.lib') {
            $path = Join-Path $qtLibDir $lib
            if (-not (Test-Path $path)) { throw "Missing IDA SDK Qt import library: $path" }
            Write-Host "Found: $path"
          }
          "IDA_QT_LIB_DIR=$qtLibDir" -replace '\\', '/' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "IDA_QT_LIB_DIR=$qtLibDir"

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup build environment
        shell: bash
        run: |
          echo "IDASDK=${{ github.workspace }}/idasdk" >> "$GITHUB_ENV"
          echo "IDABIN=${{ github.workspace }}/build/output" >> "$GITHUB_ENV"
          mkdir -p "${{ github.workspace }}/build/output/plugins"

      - name: Generate CMake from cmkr
        shell: bash
        run: env -u CI cmake -P cmkr.cmake

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      - name: Build plugin
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Verify Windows Qt namespace imports
        shell: pwsh
        run: |
          $dll = Get-ChildItem "$env:IDABIN/plugins" -Filter "ApplyCalleTypeCpp.dll" -Recurse | Select-Object -First 1
          if (-not $dll) { throw "No plugin DLL found in $env:IDABIN/plugins" }
          Write-Host "IDA_QT_LIB_DIR=$env:IDA_QT_LIB_DIR"
          Write-Host "Checking imports for: $($dll.FullName)"
          $imports = & dumpbin /IMPORTS $dll.FullName

          Write-Host "Qt-related import diagnostics:"
          $qtImportLines = $imports | Select-String -Pattern 'Qt6|@QT@@|QString|QDialog|QWidget|QFont|QObject'
          if ($qtImportLines) {
            $qtImportLines | ForEach-Object { Write-Host $_.Line }
          } else {
            Write-Host "No Qt-related import lines matched the diagnostic filter."
          }

          if ($imports -match 'QString@@|QDialog@@|QWidget@@|QFont@@|QObject@@') {
            throw "Plugin imports non-namespaced public Qt symbols; expected QT_NAMESPACE=QT imports"
          }

          $hasNamespacedDecoratedQtImports = $imports -match 'QString@QT@@|QDialog@QT@@|QWidget@QT@@|QFont@QT@@|QObject@QT@@|@QT@@'
          $hasQtDllImports = $imports -match 'Qt6Core\.dll|Qt6Gui\.dll|Qt6Widgets\.dll'

          if (-not $hasNamespacedDecoratedQtImports -and -not $hasQtDllImports) {
            throw "Plugin does not appear to import Qt libraries"
          }

          if ($hasNamespacedDecoratedQtImports) {
            Write-Host "Plugin imports verified: QT_NAMESPACE=QT decorated symbols present"
          } else {
            Write-Host "Plugin imports Qt DLLs and no checked non-namespaced public Qt symbols were found"
          }

      - name: Verify build output
        shell: bash
        run: |
          test -d "${IDABIN}/plugins"
          test -f "${IDABIN}/plugins/ApplyCalleTypeCpp.dll"

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp "${IDABIN}/plugins/ApplyCalleTypeCpp.dll" artifacts/
          cp ida-plugin.json artifacts/
          printf '%s\n' "${{ matrix.sdk_ref }}" > artifacts/ida-sdk-ref.txt
          printf 'IDA SDK ref: %s\nQt headers/tools: public Qt 6.8.0 via jurplel/install-qt-action\nQt import libs: %s/idasdk/src/lib/x64_win_qt\nQt namespace: QT\n' "${{ matrix.sdk_ref }}" "${{ github.workspace }}" > artifacts/build-info.txt
          ls -la artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish release artifacts
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: downloaded-artifacts

      - name: Package release assets
        shell: bash
        run: |
          test -d downloaded-artifacts || { echo "No artifacts were downloaded"; exit 1; }
          mkdir -p release-assets
          for artifact_dir in downloaded-artifacts/*; do
            test -d "$artifact_dir" || continue
            artifact_name="$(basename "$artifact_dir")"
            (cd "$artifact_dir" && zip -r "../../release-assets/${artifact_name}.zip" .)
          done
          test -n "$(find release-assets -type f -name '*.zip' -print -quit)" || { echo "No release assets were packaged"; exit 1; }
          ls -la release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('applycalletypecpp-autobuild-{0}', github.run_number) }}
          name: ApplyCalleTypeCpp auto build ${{ github.run_number }}
          files: release-assets/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
