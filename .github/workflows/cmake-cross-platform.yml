name: Build ApplyCalleeTypeEx Plugin

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  discover-sdk-tags:
    name: Discover IDA SDK tags
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Discover SDK tags
        id: discover
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.request

          tags = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/HexRaysSA/ida-sdk/tags?per_page=100&page={page}"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                      "User-Agent": "ApplyCalleeTypeEx-CI",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  batch = json.loads(response.read().decode("utf-8"))
              if not batch:
                  break
              tags.extend(item["name"] for item in batch)
              page += 1

          def sort_key(tag):
              numbers = tuple(int(part) for part in re.findall(r"\d+", tag))
              return numbers, tag

          tags = sorted(set(tags), key=sort_key, reverse=True)
          if not tags:
              raise SystemExit("No HexRaysSA/ida-sdk tags were discovered")

          include = []
          for tag in tags:
              safe_tag = re.sub(r"[^A-Za-z0-9_.-]+", "-", tag).strip("-")
              include.extend([
                  {
                      "os": "windows-latest",
                      "c_compiler": "cl",
                      "cpp_compiler": "cl",
                      "build_type": "Release",
                      "qt_arch": "win64_msvc2022_64",
                      "plugin_glob": "*.dll",
                      "sdk_ref": tag,
                      "artifact_name": f"ApplyCalleeTypeEx-windows-msvc-{safe_tag}",
                  },
                  {
                      "os": "ubuntu-latest",
                      "c_compiler": "gcc",
                      "cpp_compiler": "g++",
                      "build_type": "Release",
                      "qt_arch": "linux_gcc_64",
                      "plugin_glob": "*.so",
                      "sdk_ref": tag,
                      "artifact_name": f"ApplyCalleeTypeEx-linux-gcc-{safe_tag}",
                  },
              ])

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}\n")
          PY

  build:
    name: ${{ matrix.artifact_name }}
    needs: discover-sdk-tags
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-sdk-tags.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout IDA SDK
        uses: actions/checkout@v4
        with:
          repository: HexRaysSA/ida-sdk
          path: idasdk
          ref: ${{ matrix.sdk_ref }}

      - name: Install ida-cmake
        shell: bash
        run: |
          rm -rf idasdk/ida-cmake
          git clone --depth 1 https://github.com/allthingsida/ida-cmake.git idasdk/ida-cmake
          test -f idasdk/ida-cmake/bootstrap.cmake

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          target: desktop
          arch: ${{ matrix.qt_arch }}
          aqtversion: ''
          cache: true

      - name: Setup MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup build environment
        shell: bash
        run: |
          echo "IDASDK=${{ github.workspace }}/idasdk" >> "$GITHUB_ENV"
          echo "IDABIN=${{ github.workspace }}/build/output" >> "$GITHUB_ENV"
          mkdir -p "${{ github.workspace }}/build/output/plugins"

      - name: Generate CMake from cmkr
        shell: bash
        run: cmake -P cmkr.cmake

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_STANDARD=23 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      - name: Build plugin
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Verify build output
        shell: bash
        run: |
          test -d "${IDABIN}/plugins"
          find "${IDABIN}/plugins" -type f \( -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) -print
          test -n "$(find "${IDABIN}/plugins" -type f -name '${{ matrix.plugin_glob }}' -print -quit)"

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find "${IDABIN}/plugins" -type f -name '${{ matrix.plugin_glob }}' -exec cp {} artifacts/ \;
          printf '%s\n' "${{ matrix.sdk_ref }}" > artifacts/ida-sdk-ref.txt
          ls -la artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish release artifacts
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: downloaded-artifacts

      - name: Package release assets
        shell: bash
        run: |
          test -d downloaded-artifacts || { echo "No artifacts were downloaded"; exit 1; }
          mkdir -p release-assets
          for artifact_dir in downloaded-artifacts/*; do
            test -d "$artifact_dir" || continue
            artifact_name="$(basename "$artifact_dir")"
            (cd "$artifact_dir" && zip -r "../../release-assets/${artifact_name}.zip" .)
          done
          test -n "$(find release-assets -type f -name '*.zip' -print -quit)" || { echo "No release assets were packaged"; exit 1; }
          ls -la release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('applycallee-autobuild-{0}', github.run_number) }}
          name: ApplyCalleeTypeEx auto build ${{ github.run_number }}
          files: release-assets/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
