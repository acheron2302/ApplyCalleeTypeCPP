# cmkr configuration for ApplyCalleeTypeEx - IDA Pro Plugin using idax
# 
# Build Instructions:
#   1. Set IDASDK environment variable to your IDA SDK root
#   2. Generate build files: cmake -B build
#   3. Build the plugin: cmake --build build

[cmake]
version = "3.27"
cmkr-include = "cmkr.cmake"

[conditions]  
qt6 = "Qt6_FOUND"

[project]
name = "ApplyCalleeTypeEx"
version = "1.0.0"
description = "Apply callee type to indirect call location"
languages = ["CXX"]
# Use dynamic runtime
msvc-runtime = "dynamic"
# Set up IDASDK path BEFORE project() - environment setup only
cmake-before = """
# Verify IDASDK environment variable
if(NOT DEFINED ENV{IDASDK})
    message(FATAL_ERROR "IDASDK environment variable is not set!")
endif()

set(IDASDK_PATH "$ENV{IDASDK}")
file(TO_CMAKE_PATH "${IDASDK_PATH}" IDASDK_CMAKE_PATH)
message(STATUS "Original IDASDK: ${IDASDK_CMAKE_PATH}")

# Handle GitHub SDK structure (ida-cmake might be at parent level, SDK in src/)
if(NOT EXISTS "${IDASDK_CMAKE_PATH}/ida-cmake/bootstrap.cmake")
    get_filename_component(IDASDK_PARENT "${IDASDK_CMAKE_PATH}" DIRECTORY)
    message(STATUS "Looking for ida-cmake in parent: ${IDASDK_PARENT}")
    if(EXISTS "${IDASDK_PARENT}/ida-cmake/bootstrap.cmake")
        set(IDASDK_CMAKE_PATH "${IDASDK_PARENT}")
        message(STATUS "Found ida-cmake in parent, using: ${IDASDK_CMAKE_PATH}")
    endif()
endif()

if(NOT EXISTS "${IDASDK_CMAKE_PATH}/ida-cmake/bootstrap.cmake")
    message(FATAL_ERROR "ida-cmake not found at IDASDK='${IDASDK_PATH}' or '${IDASDK_CMAKE_PATH}'")
endif()

# For GitHub SDK structure, the actual SDK is in src/
if(EXISTS "${IDASDK_CMAKE_PATH}/src/include/pro.h")
    set(IDASDK_ACTUAL_PATH "${IDASDK_CMAKE_PATH}/src")
    message(STATUS "Detected GitHub SDK structure, using src/ subdirectory")
else()
    set(IDASDK_ACTUAL_PATH "${IDASDK_CMAKE_PATH}")
endif()

# Update the environment variable for ida-cmake
set(ENV{IDASDK} "${IDASDK_ACTUAL_PATH}")
message(STATUS "Set ENV{IDASDK} to: $ENV{IDASDK}")

# Set idasdk_DIR for find_package
set(idasdk_DIR "${IDASDK_CMAKE_PATH}/ida-cmake")
message(STATUS "Set idasdk_DIR to: ${idasdk_DIR}")

# Find Qt6 CMake config — prefer caller-provided paths, fall back to local IDA-compatible Qt
if(DEFINED Qt6_DIR)
    message(STATUS "Using provided Qt6_DIR: ${Qt6_DIR}")
elseif(DEFINED ENV{Qt6_DIR})
    set(Qt6_DIR "$ENV{Qt6_DIR}" CACHE PATH "Qt6 CMake directory")
    message(STATUS "Using Qt6_DIR from environment: ${Qt6_DIR}")
elseif(DEFINED CMAKE_PREFIX_PATH)
    message(STATUS "Qt6_DIR not set; relying on CMAKE_PREFIX_PATH: ${CMAKE_PREFIX_PATH}")
elseif(DEFINED ENV{CMAKE_PREFIX_PATH})
    set(CMAKE_PREFIX_PATH "$ENV{CMAKE_PREFIX_PATH}" CACHE PATH "CMake prefix path")
    message(STATUS "Using CMAKE_PREFIX_PATH from environment: ${CMAKE_PREFIX_PATH}")
elseif(EXISTS "E:/tools/qt-build/linux/qt-yusa.tar/qt-yusa/x64win/lib/cmake/Qt6")
    set(Qt6_DIR "E:/tools/qt-build/linux/qt-yusa.tar/qt-yusa/x64win/lib/cmake/Qt6" CACHE PATH "Qt6 CMake directory")
    message(STATUS "Found local IDA-compatible Qt6 at: ${Qt6_DIR}")
else()
    message(STATUS "Qt6_DIR not set and no local fallback found; find_package will search system paths")
endif()
"""

[fetch-content.idax]
git = "https://github.com/acheron2302/idax.git"
tag = "78847f113d06b52b02a64fa651e0d6d401093b0f"
subdir = "AVOID_calling_ADD_SUBDIR_in_subseqeuent_MAKEAVILABLE"

[fetch-content.fmt]
git = "https://github.com/fmtlib/fmt"  
tag = "e69e5f977d458f2650bb346dadf2ad30c5320281" 

# Plugin target - standard CMake shared library
[target.ApplyCalleeTypeEx]
cmake-before= """
# Include idasdk (platform is now detected properly)
find_package(idasdk REQUIRED)
find_package(Qt6 6.8.0 REQUIRED COMPONENTS Core Gui Widgets)

# Enable AUTOMOC for Qt moc generation
set(CMAKE_AUTOMOC ON)

# Fix idax: IDA SDK defines a `wait` macro that corrupts C++23 <atomic>/<stop_token>
# headers. Include these headers BEFORE IDA SDK headers so include guards
# prevent macro pollution from rewriting std::atomic::wait into dont_use_wait.
set(IDAX_BRIDGE "${CMAKE_BINARY_DIR}/_deps/idax-src/src/detail/sdk_bridge.hpp")
if(EXISTS "${IDAX_BRIDGE}")
    file(READ "${IDAX_BRIDGE}" BRIDGE_CONTENT)
    # Insert atomic/threading includes after <type_traits> and before IDA SDK includes
    string(REPLACE
        "#include <type_traits>\n\n// "
        "#include <type_traits>\n#include <atomic>\n#include <stop_token>\n#include <thread>\n#include <mutex>\n#include <condition_variable>\n\n// "
        BRIDGE_CONTENT "${BRIDGE_CONTENT}"
    )
    file(WRITE "${IDAX_BRIDGE}" "${BRIDGE_CONTENT}")
    message(STATUS "Patched idax sdk_bridge.hpp to include C++23 atomics before IDA SDK")
endif()

# Create idax target
set(IDAX_SRC_DIR "${CMAKE_BINARY_DIR}/_deps/idax-src")
file(GLOB_RECURSE IDAX_SOURCES CONFIGURE_DEPENDS "${IDAX_SRC_DIR}/src/*.cpp")
add_library(idax STATIC ${IDAX_SOURCES})
add_library(idax::idax ALIAS idax)

target_include_directories(idax
    PUBLIC
        ${IDAX_SRC_DIR}/include
    PRIVATE
        ${IDAX_SRC_DIR}/src
)

target_link_libraries(idax PUBLIC idasdk::plugin)
target_compile_features(idax PUBLIC cxx_std_23)
target_compile_definitions(idax PRIVATE FMT_HEADER_ONLY)

# Windows: override Qt imported library locations with IDA SDK-provided import libs
# so the plugin links against QT_NAMESPACE=QT symbols matching the IDA runtime.
if(WIN32)
    set(IDA_QT_LIB_DIR "${IDASDK_ACTUAL_PATH}/lib/x64_win_qt")
    foreach(module Core Gui Widgets)
        set(lib_path "${IDA_QT_LIB_DIR}/Qt6${module}.lib")
        if(NOT EXISTS "${lib_path}")
            message(FATAL_ERROR "Missing IDA SDK Qt import library: ${lib_path}")
        endif()
        message(STATUS "Overriding Qt6::${module} import lib with: ${lib_path}")
        set_property(TARGET Qt6::${module} PROPERTY IMPORTED_IMPLIB_RELEASE "${lib_path}")
        set_property(TARGET Qt6::${module} PROPERTY IMPORTED_IMPLIB_RELWITHDEBINFO "${lib_path}")
        set_property(TARGET Qt6::${module} PROPERTY IMPORTED_IMPLIB_MINSIZEREL "${lib_path}")
        set_property(TARGET Qt6::${module} PROPERTY IMPORTED_IMPLIB_DEBUG "${lib_path}")
    endforeach()
endif()
"""

type = "shared"
sources = ["src/main.cpp", "src/preprocessing.cpp", "src/qt_dialogs.cpp"]
compile-features = ["cxx_std_23"]
# Use fmt header-only, Qt6::Widgets for moc
link-libraries = ["idasdk::plugin", "idax", "Qt6::Core", "Qt6::Gui", "Qt6::Widgets"]
include-directories = ["${CMAKE_BINARY_DIR}/_deps/fmt-src/include"]
compile-definitions = ["FMT_HEADER_ONLY"]

# Windows: define QT_NAMESPACE for namespaced IDA Qt compatibility
windows.compile-definitions = ["QT_NAMESPACE=QT", "QT_USE_NAMESPACE"]

# Windows: SUBSYSTEM:WINDOWS
windows.link-options = ["/SUBSYSTEM:WINDOWS"]

[target.ApplyCalleeTypeEx.properties]
CXX_STANDARD_REQUIRED = true
RUNTIME_OUTPUT_DIRECTORY = "${IDABIN}/plugins"
LIBRARY_OUTPUT_DIRECTORY = "${IDABIN}/plugins"
